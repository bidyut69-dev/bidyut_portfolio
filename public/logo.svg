<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Terminal box -->
  <rect x="1" y="1" width="38" height="38" rx="8" fill="#08080f" stroke="#00f5d4" stroke-width="1.5" opacity="0.9"/>

  <!-- Top dots (window chrome) -->
  <circle cx="9"  cy="9" r="2" fill="#ff2d78" opacity="0.8"/>
  <circle cx="17" cy="9" r="2" fill="#ffd60a" opacity="0.8"/>
  <circle cx="25" cy="9" r="2" fill="#00f5d4" opacity="0.8"/>

  <!-- Divider line -->
  <line x1="1" y1="15" x2="39" y2="15" stroke="#00f5d4" stroke-width="0.5" opacity="0.3"/>

  <!-- Terminal prompt: > _ -->
  <text x="7" y="30" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#00f5d4">
    &gt;_
  </text>

  <!-- SKY text -->
  <text x="50" y="28" font-family="Syne, sans-serif" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="3">
    SKY
  </text>

  <!-- Neon glow underline -->
  <line x1="50" y1="34" x2="155" y2="34" stroke="#00f5d4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Subtle right bracket accent -->
  <text x="138" y="28" font-family="JetBrains Mono, monospace" font-size="14" font-weight="400" fill="#00f5d4" opacity="0.4">
    /&gt;
  </text>
</svg>